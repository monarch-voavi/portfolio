<svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg" style="background:#070612">
  <defs>
    <!-- фіолет (50%) → рожевий (15%) → зелений (35%) -->
    <linearGradient id="tri" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7B3FEF"/>
      <stop offset="35%"  stop-color="#9B5FFF"/>
      <stop offset="55%"  stop-color="#D47ABF"/>
      <stop offset="68%"  stop-color="#FF8EC8"/>
      <stop offset="78%"  stop-color="#55E8A0"/>
      <stop offset="100%" stop-color="#00FFA3"/>
    </linearGradient>
    <linearGradient id="triH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7B3FEF"/>
      <stop offset="35%"  stop-color="#9B5FFF"/>
      <stop offset="55%"  stop-color="#D47ABF"/>
      <stop offset="68%"  stop-color="#FF8EC8"/>
      <stop offset="78%"  stop-color="#55E8A0"/>
      <stop offset="100%" stop-color="#00FFA3"/>
    </linearGradient>
    <linearGradient id="aGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7B3FEF" stop-opacity="0.38"/>
      <stop offset="50%"  stop-color="#9B5FFF" stop-opacity="0.28"/>
      <stop offset="72%"  stop-color="#FF8EC8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00FFA3" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="hexFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7B3FEF" stop-opacity="0.12"/>
      <stop offset="60%"  stop-color="#9B5FFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00FFA3" stop-opacity="0.09"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bloom" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ambient glow — фіолетовий зліва, зелений справа -->
  <ellipse cx="70"  cy="96" rx="68" ry="62" fill="rgba(123,63,239,0.09)"/>
  <ellipse cx="100" cy="106" rx="42" ry="38" fill="rgba(0,255,163,0.07)"/>

  <!-- ── ICON ── -->
  <g transform="translate(28,18)">
    <!-- outer hex -->
    <polygon points="56,3 106,31 106,87 56,115 6,87 6,31"
      fill="none" stroke="url(#tri)" stroke-width="2" filter="url(#glow)"/>
    <!-- inner fill -->
    <polygon points="56,13 96,36 96,80 56,103 16,80 16,36"
      fill="url(#hexFill)"/>

    <!-- кутові точки: фіолет×3, рожева×1, зелений×2 -->
    <circle cx="56"  cy="3"   r="2.5" fill="#7B3FEF" opacity="0.9"/>
    <circle cx="106" cy="31"  r="2"   fill="#9B5FFF" opacity="0.82"/>
    <circle cx="106" cy="87"  r="2"   fill="#FF8EC8" opacity="0.65"/>
    <circle cx="56"  cy="115" r="2.5" fill="#00FFA3" opacity="0.9"/>
    <circle cx="6"   cy="87"  r="2"   fill="#55E8A0" opacity="0.8"/>
    <circle cx="6"   cy="31"  r="2"   fill="#8040E8" opacity="0.78"/>

    <!-- A ghost -->
    <g filter="url(#softglow)">
      <line x1="26" y1="92" x2="56" y2="24" stroke="url(#aGrad)" stroke-width="11" stroke-linecap="round"/>
      <line x1="56" y1="24" x2="86" y2="92" stroke="url(#aGrad)" stroke-width="11" stroke-linecap="round"/>
      <line x1="37" y1="70" x2="75" y2="70" stroke="url(#aGrad)" stroke-width="6"  stroke-linecap="round"/>
    </g>

    <!-- V -->
    <polyline points="21,33 56,84 91,33"
      fill="none" stroke="url(#tri)" stroke-width="3.8"
      stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

    <!-- зелена крапка + рожеве кільце тонке + фіолетове зовні -->
    <circle cx="56" cy="86" r="5"  fill="#00FFA3" filter="url(#glow)"/>
    <circle cx="56" cy="86" r="9"  fill="none" stroke="#FF8EC8" stroke-width="0.8" opacity="0.4"/>
    <circle cx="56" cy="86" r="13" fill="none" stroke="#9B5FFF"  stroke-width="1"   opacity="0.3"/>
  </g>

  <!-- text bloom -->
  <text x="155" y="88" fill="url(#triH)"
    font-family="Arial Black, Helvetica, sans-serif"
    font-size="38" font-weight="900" letter-spacing="1"
    opacity="0.18" filter="url(#bloom)">VA_DEV</text>

  <!-- text main -->
  <text x="155" y="88" fill="white"
    font-family="Arial Black, Helvetica, sans-serif"
    font-size="38" font-weight="900" letter-spacing="1">VA<tspan fill="url(#triH)">_DEV</tspan></text>

  <!-- subtitle -->
  <text x="157" y="114" fill="#7050A0"
    font-family="monospace" font-size="11" letter-spacing="4">FRONTEND DEVELOPER</text>

  <!-- gradient underline -->
  <rect x="155" y="122" width="305" height="1.2" fill="url(#triH)" opacity="0.3" rx="1"/>

  <!-- dots: фіолет фіолет рожевий зелений зелений -->
  <circle cx="158" cy="136" r="2.5" fill="#7B3FEF" opacity="0.85"/>
  <circle cx="167" cy="136" r="2.2" fill="#9B5FFF" opacity="0.75"/>
  <circle cx="175" cy="136" r="1.8" fill="#FF8EC8" opacity="0.5"/>
  <circle cx="183" cy="136" r="2"   fill="#55E8A0" opacity="0.7"/>
  <circle cx="191" cy="136" r="1.5" fill="#00FFA3" opacity="0.8"/>
</svg>
